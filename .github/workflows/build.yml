name: Build and Push

on:
  push:
    branches: [main, submission]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/pettecco/rinha-de-backend-2026-go:latest
            ghcr.io/pettecco/rinha-de-backend-2026-go:${{ github.sha }}
